aid: doubleverify
name: DoubleVerify
description: >-
  DoubleVerify (NYSE: DV) is a New York-based software platform for digital
  media measurement, data, and analytics. The company's Media Effectiveness
  Platform — branded DV MAP (Media AdVantage Platform) — verifies ad
  impressions across the open web, social, connected TV, and commerce
  networks, detecting fraud and invalid traffic (IVT), measuring viewability
  and attention, scoring brand suitability and contextual relevance, and
  attributing outcomes. The platform analyzes trillions of media
  transactions per year for advertisers, publishers, supply-side platforms,
  and ad marketplaces. Core products include DV Authentic Attention, DV
  Custom Contextual (a semantic-science contextual targeting engine across
  200k+ concepts), DV Authentic Brand Suitability, the DV Publisher Suite,
  DV Marketplace Suite, and Scibids AI for AI-powered programmatic bidding.
  DoubleVerify is MRC-accredited and integrates with the leading DSPs,
  SSPs, social platforms (Meta, TikTok, YouTube, X, Snap, Pinterest,
  Reddit, LinkedIn), CTV platforms, retail-media networks, and ad servers.
  Customers and partners access measurement, contextual, and optimization
  data primarily through DV Pinnacle — DoubleVerify's customer-facing
  reporting and configuration platform — which exposes a Bearer-token
  protected Data API for pulling reports, and through SDK and tag-based
  integrations on supply and publisher endpoints. DoubleVerify does not
  publish an open developer portal or an OpenAPI specification; developer
  documentation at developer.doubleverify.com is gated, and API tokens are
  provisioned per partner/program through Pinnacle.
