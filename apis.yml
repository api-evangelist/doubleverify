solutions:
  - name: DV Authentic Attention
    description: >-
      Privacy-friendly, MRC-accredited attention measurement that combines
      exposure and engagement signals (including direct platform signals on
      partners like TikTok) into a single Authentic Attention score for
      optimizing creative and media performance.
    url: https://doubleverify.com
  - name: DV Authentic Brand Suitability
    description: >-
      Pre- and post-bid brand suitability and brand safety classification
      across open web, social, and CTV, aligned with GARM and DV's own
      taxonomy, with IAS-style avoidance and targeting controls.
    url: https://doubleverify.com
  - name: DV Custom Contextual
    description: >-
      Semantic-science contextual targeting and avoidance segments built on
      DV's classification engine over 200,000+ concepts, including in-market,
      seasonal, and event-based categories, distributed via DSPs and SSPs.
    url: https://doubleverify.com
  - name: DV Fraud and Invalid Traffic Protection
    description: >-
      Detection and blocking of general and sophisticated invalid traffic
      (GIVT/SIVT), bot networks, app fraud, CTV fraud, and ad-stacking
      schemes; MRC-accredited across multiple environments.
    url: https://doubleverify.com
  - name: DV Viewability
    description: >-
      MRC-accredited viewability measurement across display, video, mobile
      web, in-app, and CTV, plus Open Measurement SDK (OMSDK) and tag-based
      integrations with major platforms.
    url: https://doubleverify.com
  - name: DV Publisher Suite
    description: >-
      Publisher-side tools for revenue analytics, inventory quality, quality
      targeting, and Authentic Direct, helping publishers monetize verified
      supply and shore up programmatic yield.
    url: https://doubleverify.com
  - name: DV Marketplace Suite
    description: >-
      SSP and ad-marketplace solutions for inventory verification, supply-path
      transparency, and advertiser confidence on the sell side.
    url: https://doubleverify.com
  - name: Scibids AI
    description: >-
      AI-powered programmatic bidding and campaign optimization engine
      (acquired 2023) that plugs into DSPs to drive media-buying decisions
      using custom KPIs and DV measurement signals.
    url: https://doubleverify.com
  - name: Rockerbox Attribution
    description: >-
      Marketing attribution, marketing mix modeling, and incrementality
      testing capabilities (Rockerbox, acquired 2025) integrated into the
      Prove pillar of the DV MAP platform.
    url: https://doubleverify.com
  - name: DV Pinnacle
    description: >-
      DoubleVerify's customer-facing reporting and configuration platform.
      Pinnacle is where advertisers, agencies, and partners configure
      campaigns, view verification and attention dashboards, generate Data
      API Bearer tokens, and manage partner integrations.
    url: https://pinnacle.doubleverify.com
